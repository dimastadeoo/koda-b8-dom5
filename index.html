<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            min-width: 100vh;
        }
        .form{
            margin-top: 64px;
            width: 100%;
            justify-content: center;
            align-items: center;
            display: flex;
        }

        form{
            display: grid;
            gap: 12px;
        }

        .title{
            font-weight: 600;
            font-size: 24px;
            color: black;
        }

        .text{
            font-weight: 400;
            font-size: 14px;
            color: gray;
        }

        .color-black{
            color: black;
        }

        .container-input{
            display: grid;
            gap: 4px;
            min-width: 200px;
        }

        .input{
            width: 100%;
            position: relative;
        }
        input{
            width: 100%;
            padding: 2px 4px;
        }
        .eye{
            position: absolute;
            border: none;
            background: none;
            right: 0;
            padding: 3px 4px;
            cursor: pointer;
        }

        .eye svg{
            display: none;
        }

        .eye svg.active{
            display: block;
        }

        .button-submit{
            color: white;
            background: blue;
            border-radius: 4px;
            padding-bottom: 4px;
            padding-top: 4px;
        }

        .nav-content{
            display: grid;
            grid-template-columns: 1fr auto; 
            align-items: center;
            padding: 18px;
            background: #48d667;
        }
        

        .nav-menu{
            display: flex;
            list-style: none;
            gap: 12px;
        }

        .nav-link{
            text-decoration: none;
            color: white;
        }
        .brand{
            display: flex;
            align-items: center;
        }
        .nav-brand{
            text-decoration: none;
            color: #410505;
        }

        .toggle-button{
            display: none;
            background: none;
            border: none;
            align-items: center;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            
       .toggle-button {
            display: flex;
        }

        .nav-menu {
            display: none;
            grid-auto-flow: row; 
            gap: 12px;
            padding: 8px 0 0 0;
            grid-column: 1 / span 2; 
        }

        .nav-menu.open {
            display: grid;
        }
    }

    </style>
</head>
<body>
    <nav class="nav-content">
        <div class="brand">
            <a href="" class="nav-brand">Admin</a>
        </div>
        
        <button type="button" class="toggle-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-menu-icon lucide-square-menu"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 8h10"/><path d="M7 12h10"/><path d="M7 16h10"/></svg>
        </button>

        <ul class="nav-menu">
            <li>
                <a href="#" class="nav-link">
                    Dashboard
                </a>
            </li>
            <li>
                <a href="#" class="nav-link">
                    Profile
                </a>
            </li>
            <li>
                <a href="#" class="nav-link">
                    Setting
                </a>
            </li>
        </ul>
    </nav>


    <div class="form">
        <form>
            <h1 class="title">Ubah Password</h1>
            <div class="container-input">
                <div class="text">
                    <label for="pass"> Masukkan Password</label>
                </div>
                <div class="input">
                    <input type="password" name="pass" id="pass" class=".color-black pass">
                    <button type="button" class="eye">
                        <svg class="active" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-closed-icon lucide-eye-closed"><path d="m15 18-.722-3.25"/><path d="M2 8a10.645 10.645 0 0 0 20 0"/><path d="m20 15-1.726-2.05"/><path d="m4 15 1.726-2.05"/><path d="m9 18 .722-3.25"/></svg>
                    </button>
                </div>
            </div>
            <div class="container-input">
                <div class="text">
                    <label for="confirmPass"> Konfirmasi Password</label>
                </div>
                <div class="input">
                    <input type="password" name="confirmPass" id="confirmPass" class=".color-black pass">
                    <button type="button" class="eye">
                        <svg class="active" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-closed-icon lucide-eye-closed"><path d="m15 18-.722-3.25"/><path d="M2 8a10.645 10.645 0 0 0 20 0"/><path d="m20 15-1.726-2.05"/><path d="m4 15 1.726-2.05"/><path d="m9 18 .722-3.25"/></svg>
                    </button>
                </div>
            </div>
            <div class="container-input">
                <button type="submit" class="button-submit">
                    Ubah Password
                </button>
            </div>
        </form>
    </div>

    <script>
        const clickPass = document.querySelector('.eye')
        const inputPass = document.querySelector('.pass')

        const hamburger = document.querySelector('.toggle-button')

        clickPass.addEventListener("click", function(){
           const icons = document.querySelectorAll('.eye svg'); 

            icons.forEach(svg => {
                svg.classList.toggle('active');
            });

            if (inputPass.type === "password") {
                inputPass.type = "text";
            } else {
                inputPass.type = "password";
            }
        })
        hamburger.addEventListener('click', function(){
            const navMenu = document.querySelector('.nav-menu')

            navMenu.classList.toggle('open')
        })
    </script>
</body>
</html>
